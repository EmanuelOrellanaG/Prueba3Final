server:
  port: 8083

spring:
  application:
    name: membresia-service

  datasource:
    url: jdbc:mysql://host.docker.internal:3306/gym_db?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: mi_clave_super_segura_de_gym_2026_minimo_32_chars


eureka:
  client:
    enabled: false
