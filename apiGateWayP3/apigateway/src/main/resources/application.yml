server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: usuario-service
              uri: http://localhost:8082
              predicates:
                - Path=/usuarios/**

            - id: membresia-service
              uri: http://localhost:8083
              predicates:
                - Path=/membresias/**

jwt:
  secret: "mi_clave_super_segura_de_gym_2026_minimo_32_chars"