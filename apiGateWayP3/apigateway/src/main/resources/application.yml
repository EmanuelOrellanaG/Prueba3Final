server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:

            # AUTH
            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/auth/**

            # USUARIO
            - id: usuario-service
              uri: http://usuario-service:8082
              predicates:
                - Path=/api/usuarios/**

            # MEMBRESIA
            - id: membresia-service
              uri: http://membresia-service:8083
              predicates:
                - Path=/api/membresias/**

            # PAGO
            - id: pago-service
              uri: http://pago-service:8084
              predicates:
                - Path=/api/pagos/**

            # EJERCICIO
            - id: ejercicio-service
              uri: http://ejercicio-service:8085
              predicates:
                - Path=/api/ejercicios/**

            # RUTINA
            - id: rutina-service
              uri: http://rutina-service:8086
              predicates:
                - Path=/api/rutinas/**

            # CLASE
            - id: clase-service
              uri: http://clase-service:8087
              predicates:
                - Path=/api/clases/**

            # RESERVA
            - id: reserva-service
              uri: http://reserva-service:8088
              predicates:
                - Path=/api/reservas/**

jwt:
  secret: "mi_clave_super_segura_de_gym_2026_minimo_32_chars"