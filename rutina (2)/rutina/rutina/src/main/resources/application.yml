server:
  port: 8086

spring:
  application:
    name: rutina-service

  datasource:
    url: jdbc:mysql://localhost:3306/gym_db?useSSL=false&serverTimezone=UTC
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

jwt:
  secret: mi_clave_super_segura_de_gym_2026_minimo_32_chars


eureka:
  client:
    enabled: false
