server:
  port: 8088

spring:
  application:
    name: reserva-service

  datasource:
    url: jdbc:mysql://host.docker.internal:3306/gym_db?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: mi_clave_super_segura_de_gym_2026_minimo_32_chars

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always


eureka:
  client:
    enabled: false

